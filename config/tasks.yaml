# 1 | DATA MINER LAYER
fetch_external_api_logs_task:
  description: >
    Sync the latest repository history for the repository owned by '{repo_owner}' names '{repo_name}',
    ans sync the recent Figma design activity for the file key '{figma_file_key}'.
    Use the Sync Github Commits tool and the Sync Figma Activity tool to fetch today's data.
    Verify that all modified commits, frames, components, and timestamps were successfully captured.
  expected_output: >
    A strict confirmation detailing the total number of raw Github commit entries and Figma activity rows successfully retrieved.


# 2 | DATABASE ARCHIVER LAYER
archive_data_task:
  description: >
    Review the raw text strings provided by the fetch_api_logs_task and evaluate_figma_task.
    Loop through each entry line and invoke the database tools to persist them to the Neon database storage engine.
    Ensure that any commit SHA or Figma comment timestamp that already exists in the tables is silently skipped to prevent duplication errors.
  expected_output: >
    A strict log summary detailing the exact count of new rows saved to the database versus existing rows skipped.


# 3 | VELOCITY INSPECTOR LAYER
audit_velocity_metrics_task:
  description: >
    "Execute the 'Get Project Team Status' tool. "
    "Take the exact output string from that tool and map it to the requested structure. "
    "CRITICAL: Do not invent names or create text not provided by the tool."
  expected_output: >
    "A structured list of current team members directly from database tools."

# 4 | COMMUNICATION LAYER
broadcast_alert_task:
  description: >
    Take the final formatted Markdown project health audit report generated by the audit_velocity_metrics_task.
    Do not alter or summarize the core conclusions.
    If the report text exceeds 1900 characters, break it into logical chunks or cleanly truncate it with a notice to prevent breaching Discord's strict 2000-characters webhook limit.
    Pass the validated text directly into the chat notification payload and execute the channel transmisison tool.
  expected_output: >
    A string matching this exact template layout. Do not use custom ASCII symbols, raw code escapes like '\u00B7', or unclosed tables:

    # Project Health Update
    
    ## Active Alerts 

      - **Alert:** [Insert alert name here]
      - **Details:** [Insert short details here]

    ## Developer Activities [create a list of team members and their status]

      - **Team Member:** [Name] | **Status:** [Active/Inactive] | **Inactive Hours:** [hours_inactive] | **Contributed Today:** [has_contributed_today]
    
    **Remedial Action:** [Insert action item here]